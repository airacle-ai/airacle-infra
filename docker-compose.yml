## ─────────────────────────────────────────────────────
##  airacle 多项目开发环境
##
##  设计原则:
##    - 二进制共享: 所有容器 FROM airacle-dev:latest（同一镜像层）
##    - 会话隔离:   每个项目自己的 .claude/ .omnara/ workspace/
##    - 团队共享:   shared/ 只读挂载，所有人读同一份团队配置
##
##  新增项目: 复制一份 service 块，改 container_name 和路径即可
## ─────────────────────────────────────────────────────

x-airacle-base: &airacle-base
  image: airacle-dev:latest
  stdin_open: true
  tty: true
  network_mode: host
  restart: unless-stopped
  # ── GPU 透传（docker-compose v1 方式）──────────────────
  # deploy.resources 是 swarm 语法，v1 不支持；这里用 runtime
  runtime: nvidia
  environment:
    - IS_SANDBOX=1
    - LANG=en_US.UTF-8
    - TZ=Asia/Shanghai
    # GPU 相关（nvidia-container-runtime 会读这两个变量）
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # ↑ API Keys 不在这里 —— 全部从各项目的 env_file 注入

services:

  # ─── airacle-dev（首个测试容器） ─────────────────────
  airacle-dev:
    <<: *airacle-base
    container_name: airacle-dev
    # ⚠️ hostname 必须 = container_name —— Omnara 用它作为 Dashboard 上的机器名
    #    详见 docs/08-lessons-learned.md 坑 9
    hostname: airacle-dev
    # 加载顺序：后者覆盖前者
    #   1. ~/.airacle/secrets.env       = 中央 API keys（所有项目共享，git 永远碰不到）
    #   2. projects/airacle-dev/.env    = 本项目特定的非密参数
    env_file:
      - ~/.airacle/secrets.env
      - projects/airacle-dev/.env
    volumes:
      # 团队共享配置（只读，所有项目共用一份）
      - ./shared/claude-settings:/shared/claude-settings:ro

      # 该项目独立的工具状态（完全隔离）
      - ./projects/airacle-dev/.claude:/root/.claude
      # ⚠️ Claude Code 还会写一个 /root/.claude.json（文件，不在 .claude/ 文件夹下）
      #    必须单独挂出来，否则重建容器会丢；详见 docs/04-troubleshooting.md Q10
      - ./projects/airacle-dev/.claude.json:/root/.claude.json
      - ./projects/airacle-dev/.omnara:/root/.omnara

      # 工作区
      - ./projects/airacle-dev/workspace:/workspace

      # Git / SSH (只读)
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
